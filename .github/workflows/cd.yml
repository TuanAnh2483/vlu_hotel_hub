name: CD - Build & Push Docker Image

on:
  # Chỉ chạy sau khi CI - Build & Test hoàn thành thành công.
  # Đảm bảo không bao giờ deploy code mà tests đang fail.
  workflow_run:
    workflows: ["CI - Build & Test"]
    types:
      - completed
    branches: [ master, main ]
  # Cho phép trigger thủ công (hotfix, re-deploy)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push to GitHub Container Registry
    runs-on: ubuntu-latest
    # Chỉ chạy khi CI pass (hoặc trigger thủ công)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout commit SHA mà CI đã test (không phải HEAD mới nhất)
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (tests đã chạy ở CI job)
        run: mvn clean package -DskipTests
        working-directory: backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'master' || github.event.workflow_run.head_branch == 'main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    # Required GitHub Secrets:
    #   SSH_HOST         — VPS IP or hostname
    #   SSH_USER         — SSH username (e.g. ubuntu)
    #   SSH_PRIVATE_KEY  — private key content (ED25519 or RSA)
    #   SSH_PORT         — SSH port (default 22)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/hotel-backend
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            docker compose down --remove-orphans
            docker compose up -d
            docker image prune -f
            echo "Deploy complete — $(date)"

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            http://${{ secrets.SSH_HOST }}:8080/api/v1/health \
            || (echo "Health check failed" && exit 1)
