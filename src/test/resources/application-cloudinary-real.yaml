app:
  uploads:
    provider: cloudinary
    cloudinary:
      enabled: true
      cloud-name: ${UPLOAD_CLOUDINARY_CLOUD_NAME}
      api-key: ${UPLOAD_CLOUDINARY_API_KEY}
      api-secret: ${UPLOAD_CLOUDINARY_API_SECRET}
      folder-prefix: ${UPLOAD_CLOUDINARY_FOLDER_PREFIX:hotel-backend-real-test}
