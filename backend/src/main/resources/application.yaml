spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000

  mail:
    from: ${MAIL_FROM:no-reply@hotel.local}
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        boot:
          allow_jdbc_metadata_access: false

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:20MB}

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  payment:
    provider: ${PAYMENT_PROVIDER:sepay-vietqr}
    transfer-prefix: ${PAYMENT_TRANSFER_PREFIX:HHB}
    qr-image-url: ${PAYMENT_QR_IMAGE_URL:}
    bank:
      account-no: ${PAYMENT_BANK_ACCOUNT_NO}
      account-name: ${PAYMENT_BANK_ACCOUNT_NAME}
      bank-name: ${PAYMENT_BANK_NAME}
      bank-bin: ${PAYMENT_BANK_BIN:}
    sepay:
      webhook-api-key: ${PAYMENT_SEPAY_WEBHOOK_API_KEY}

  jwt:
    secret: ${JWT_SECRET}
    exp-seconds: ${JWT_EXP_SECONDS:1800}

  admin-seed:
    enabled: ${ADMIN_SEED_ENABLED:true}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD}

  password-reset:
    frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}

  email-verification:
    frontend-verify-url: ${EMAIL_VERIFICATION_FRONTEND_URL:http://localhost:5173/verify-email}

  resend:
    api-key: ${RESEND_API_KEY:}

  app:
    mail:
      enabled: ${APP_MAIL_ENABLED:false}
      from: ${APP_MAIL_FROM:Hotel <onboarding@resend.dev>}

  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:no-reply@hotel.local}
    expose-debug-tokens: ${MAIL_EXPOSE_DEBUG_TOKENS:false}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://hotel-backend.pages.dev,https://*.hotel-backend.pages.dev}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  uploads:
    provider: ${UPLOAD_PROVIDER:local}
    storage-root: ${UPLOAD_STORAGE_ROOT:./uploads}
    public-base-path: ${UPLOAD_PUBLIC_BASE_PATH:/uploads}
    max-file-size-bytes: ${UPLOAD_MAX_FILE_SIZE_BYTES:10485760}

    cloudinary:
      enabled: ${UPLOAD_CLOUDINARY_ENABLED:false}
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder-prefix: ${CLOUDINARY_FOLDER_PREFIX:hotel-backend}

    s3:
      enabled: ${UPLOAD_S3_ENABLED:false}
      bucket: ${UPLOAD_S3_BUCKET:}
      region: ${UPLOAD_S3_REGION:ap-southeast-1}
      access-key: ${UPLOAD_S3_ACCESS_KEY:}
      secret-key: ${UPLOAD_S3_SECRET_KEY:}
      key-prefix: ${UPLOAD_S3_KEY_PREFIX:hotel-backend}
      public-base-url: ${UPLOAD_S3_PUBLIC_BASE_URL:}

  ai:
    gemini-api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}

logging:
  level:
    org.springframework.web: INFO